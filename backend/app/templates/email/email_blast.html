<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ subject }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>

<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, Helvetica, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 0;">
    <tr>
      <td align="center">

        <!-- CARD -->
        <table width="600" cellpadding="0" cellspacing="0"
               style="background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.08);">

          <!-- HEADER -->
          <tr>
            <td style="background:#2563eb; padding:24px; color:#ffffff;">
              <h1 style="margin:0; font-size:22px;">📢 {{ event_name }}</h1>
              <p style="margin:6px 0 0; font-size:14px; opacity:0.9;">
                Message from the Event Organizer
              </p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:28px; color:#111827;">

              <p style="font-size:16px; margin-top:0;">
                Hi <strong>{{ attendee_name }}</strong>,
              </p>

              <p style="font-size:15px; line-height:1.6; white-space:pre-wrap;">{{ body }}</p>

              <p style="margin-top:24px; font-size:14px;">
                Warm regards,<br/>
                <strong>{{ organizer_name }}</strong>
              </p>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#f9fafb; padding:18px; text-align:center; font-size:12px; color:#6b7280;">
              This message was sent to registered attendees of <strong>{{ event_name }}</strong>.<br/>
              You received this because you have a confirmed booking for this event.
            </td>
          </tr>

        </table>
        <!-- /CARD -->

      </td>
    </tr>
  </table>

</body>
</html>
