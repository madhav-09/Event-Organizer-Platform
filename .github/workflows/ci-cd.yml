name: Simple Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Redeploy on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - << 'PY' > ~/.ssh/id_rsa
          import os
          key = os.environ.get("EC2_SSH_KEY", "").strip().replace("\r", "")
          if "\\n" in key:
              key = key.replace("\\n", "\n")
          if not key.endswith("\n"):
              key += "\n"
          print(key, end="")
          PY
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "$EC2_USERNAME@$EC2_HOST" << 'EOF'
          set -e
          cd ~/Event-Organizer-Platform
          git fetch origin
          git checkout main
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build
          docker compose ps
          EOF