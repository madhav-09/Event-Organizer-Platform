name: Simple CI/CD

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend install
        working-directory: backend
        run: pip install -r requirements.txt

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - << 'PY' > ~/.ssh/id_rsa
          import os
          key = os.environ.get("EC2_SSH_KEY", "").strip().replace("\r", "")
          if "\\n" in key:
              key = key.replace("\\n", "\n")
          if not key.startswith("-----BEGIN") or "PRIVATE KEY-----" not in key:
              raise SystemExit("EC2_SSH_KEY is missing or malformed")
          if not key.endswith("\n"):
              key += "\n"
          print(key, end="")
          PY
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no "$EC2_USERNAME@$EC2_HOST" << 'EOF'
          set -e
          cd ~/Event-Organizer-Platform
          git fetch origin
          git checkout main
          git reset --hard origin/main
          docker compose up -d --build
          docker compose ps
          curl -fsS http://localhost:8000/health
          EOF
